<script>

squaresize = 100;

if(innerWidth > innerHeight){
    squaresize = innerHeight;
    document.getElementById("scroll").style.top="0px";
    document.getElementById("scroll").style.right= squaresize.toString() + "px";
}

function setup(){
    createCanvas(squaresize-50, squaresize-50);    
}

thermometer = {};

thermometer.temperature = 293;//K
thermometer.min_temperature = 3;//K
thermometer.max_temperature = 400;//K
thermometer.unit = "K";
thermometer.sensor_name = "dirt wizard guess";
thermometer.sensor_type = "guess";
thermometer.note = "o hi!";
thermometer.temperature_array = [];
thermometer.time_array = [];
thermometer.note_array = [];
thermometer.url = "https://trashrobot.net/thermometer/";
thermometer.thermometer_web = [];//array of links 
thermometer.thermometer_web.push(thermometer.url);
savethermometer();

document.getElementById("min_temperature_input").value = thermometer.min_temperature;
document.getElementById("max_temperature_input").value = thermometer.max_temperature;

document.getElementById("unit_input").value = thermometer.unit;

document.getElementById("sensor_name_input").value = thermometer.sensor_name;
document.getElementById("sensor_type_input").value = thermometer.sensor_type;
document.getElementById("note_input").value = thermometer.note;
document.getElementById("url_input").value = thermometer.url;

document.getElementById("temperature_input").select();
document.getElementById("temperature_input").value = "";

document.getElementById("temperature_input").onchange = function(){
    if(isNaN(parseFloat(this.value))){
        alert("not a number!");
    }
    else{



    }
    document.getElementById("temperature_input").value = "";
    
}


function drawlinkfeed(){
    document.getElementById("linkfeed").innerHTML = "";
    for(var index = thermometer.thermometer_web.length - 1;index >= 0;index--){
        var newlinkbox = document.createElement("DIV");
        newlinkbox.classList.add("linkbox");
        document.getElementById("linkfeed").appendChild(newlinkbox);

        var newlink = document.createElement("A");
        newlink.innerHTML = thermometer.thermometer_web[index];
        newlink.href = thermometer.thermometer_web[index];

        var new_delete_button = document.createElement("SPAN");
        new_delete_button.classList.add("button");
        new_delete_button.classList.add("link-delete-button");
        new_delete_button.innerHTML = "DELETE";
        new_delete_button.onclick = function(){
            var newindex = parseInt(this.parentElement.getElementsByClassName("data")[0].innerHTML);
            var newlinks = [];
            for(var lindex = 0;lindex < thermometer.thermometer_web.length;lindex++){
                if(lindex != newindex){
                    newlinks.push(thermometer.thermometer_web[lindex]);
                }
            }
            thermometer.thermometer_web = newlinks;
            drawlinkfeed();
            savethermometer()
        }
        newlinkbox.appendChild(new_delete_button);
        newlinkbox.appendChild(newlink);
        var indexdata = document.createElement("SPAN");
        indexdata.classList.add("data");
        indexdata.innerHTML = index.toString();
        newlinkbox.appendChild(indexdata);
    }

}

function savethermometer(){
    var httpc = new XMLHttpRequest();
    httpc.open("POST", "save-file.php", true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(JSON.stringify(thermometer,null,"    "))+"&filename=thermometer.json");//send text to save-file.php
}

var httpclinks = new XMLHttpRequest();
httpclinks.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        thermometer = JSON.parse(this.responseText);    
        drawlinkfeed();
    }
};
httpclinks.open("GET", "load-file.php?filename=thermometer.json", true);
httpclinks.send();

</script>
